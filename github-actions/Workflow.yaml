name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-app:latest .

      - name: Run container test
        run: |
          docker run -d -p 5000:5000 --name test-container ${{ secrets.DOCKER_USERNAME }}/docker-ci-app:latest
          sleep 5
          curl -f http://localhost:5000
          docker stop test-container
          docker rm test-container

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-app:latest